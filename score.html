<div>
    <h1 class="Score">Your Score: <span id="score">0</span></h1>
    <button class="Score" onclick="AddRack()">Add Rack</button>
    <h2 class="Score">High Score: <span id="highScore">0</span></h2>
    <button class="Score" onclick="resetGame()">Play Again</button>
    <button class="Score" onclick="goToMenu()">Main Menu</button>
</div>

<!-- CSS -->

<style>
    
</style>

<!-- JS -->

<script>
    function AddRack() {
        var score = parseInt(document.getElementById("score").innerHTML);
        score += 14;
        document.getElementById("score").innerHTML = score;
        if (score > parseInt(document.getElementById("highScore").innerHTML)) {
            document.getElementById("highScore").innerHTML = score;
        }
    }

    function resetGame() {
        document.getElementById("score").innerHTML = 0;
    }

    function goToMenu() {
        window.location.href = "index.html";
    }
</script>
